name: Publish Python 🐍 distribution 📦 to PyPI

on:
  release:
    types:
      - created

jobs:
  build:
    name: Build distribution 📦
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Bump version
      run: |
        VERSION=$(git describe --tags --abbrev=0)
        uvx --from=toml-cli toml set --toml-path=pyproject.toml project.version "${VERSION#v}"
        sed -i "s/^version: .*/version: \"${VERSION#v}\"/" CITATION.cff
        sed -i "s/^date-released: .*/date-released: \"$(date -u +%Y-%m-%d)\"/" CITATION.cff
    - name: Commit updated CITATION.cff
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add CITATION.cff
        git diff --cached --quiet || git commit -m "chore: update CITATION.cff for ${VERSION#v}"
        git push origin HEAD:main
      env:
        VERSION: ${{ github.ref_name }}
    - name: Build a binary wheel and a source tarball
      run: uv build
    - name: Store the distribution packages
      uses: actions/upload-artifact@v4
      with:
        name: python-package-distributions
        path: dist/

  publish-to-pypi:
    name: >-
      Publish Python 🐍 distribution 📦 to PyPI
    if: startsWith(github.ref, 'refs/tags/')  # only publish to PyPI on tag pushes
    needs:
    - build
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://pypi.org/p/healthchain
    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing
    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/
    - name: Publish distribution 📦 to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
