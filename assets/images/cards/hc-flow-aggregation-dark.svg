<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560" role="img" aria-label="Multi-EHR aggregation flow: Epic, Cerner and other live FHIR sources flow through FHIRGateway into one unified patient record consumed by your model or agent">
  <rect x="0" y="0" width="880" height="560" rx="16" fill="#2b2532"/>
  <text x="34" y="52" font-size="19" letter-spacing="2" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" fill="#a89fb0">LIVE EHR SOURCES</text>
  <text x="352" y="52" font-size="19" letter-spacing="2" font-weight="700" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" fill="#e59875">HEALTHCHAIN</text>
  <text x="648" y="52" font-size="19" letter-spacing="2" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" fill="#a89fb0">ONE RECORD</text>

  <rect x="34" y="92"  width="236" height="58" rx="8" fill="#241f2a" stroke="#4d4556" stroke-width="1.75"/>
  <text x="54" y="128" font-size="20" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" fill="#f0edf2">Epic · FHIR R4</text>
  <rect x="34" y="170" width="236" height="58" rx="8" fill="#241f2a" stroke="#4d4556" stroke-width="1.75"/>
  <text x="54" y="206" font-size="20" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" fill="#f0edf2">Cerner · FHIR R4</text>
  <rect x="34" y="248" width="236" height="58" rx="8" fill="#241f2a" stroke="#4d4556" stroke-width="1.75"/>
  <text x="54" y="284" font-size="20" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" fill="#f0edf2">Your EHR · FHIR</text>

  <g opacity="0.5">
    <rect x="34" y="404" width="236" height="58" rx="8" fill="#241f2a" stroke="#4d4556" stroke-width="1.75"/>
    <text x="54" y="430" font-size="18" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" fill="#a89fb0">manual DB extracts</text>
    <text x="54" y="452" font-size="16" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" fill="#a89fb0">CSVs · research dumps</text>
    <path d="M150 404 L150 330" stroke="#a89fb0" stroke-width="1.75" stroke-dasharray="6 6" fill="none" marker-end="url(#da1)"/>
  </g>
  <text x="168" y="368" font-size="18" font-weight="700" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" fill="#e59875">migrate</text>

  <path d="M270 121 C305 121 305 180 336 196" stroke="#a89fb0" stroke-width="1.75" fill="none" marker-end="url(#da1)"/>
  <path d="M270 199 L336 212" stroke="#a89fb0" stroke-width="1.75" fill="none" marker-end="url(#da1)"/>
  <path d="M270 277 C305 277 305 248 336 230" stroke="#a89fb0" stroke-width="1.75" fill="none" marker-end="url(#da1)"/>

  <rect x="340" y="130" width="248" height="196" rx="10" fill="#3d2f28" stroke="#e59875" stroke-width="2.5"/>
  <text x="364" y="176" font-size="23" font-weight="700" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" fill="#e59875">FHIRGateway</text>
  <text x="364" y="216" font-size="18" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" fill="#f0edf2">add_source()</text>
  <text x="364" y="248" font-size="18" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" fill="#f0edf2">aggregate</text>
  <text x="364" y="280" font-size="18" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" fill="#f0edf2">dedupe + provenance</text>
  <rect x="562" y="140" width="10" height="10" fill="#e59875"/>
  <rect x="550" y="152" width="10" height="10" fill="#f0b49a"/>
  <rect x="562" y="164" width="10" height="10" fill="#e59875"/>

  <path d="M588 228 L636 228" stroke="#e59875" stroke-width="3" fill="none" marker-end="url(#da2)"/>

  <rect x="640" y="130" width="208" height="196" rx="10" fill="#241f2a" stroke="#4d4556" stroke-width="1.75"/>
  <text x="662" y="174" font-size="20" font-weight="700" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" fill="#f0edf2">Patient/123</text>
  <text x="662" y="210" font-size="17" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" fill="#a89fb0">Conditions ×4</text>
  <text x="662" y="240" font-size="17" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" fill="#a89fb0">Medications ×7</text>
  <text x="662" y="270" font-size="17" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" fill="#a89fb0">Observations ×32</text>
  <text x="662" y="303" font-size="16" font-weight="700" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" fill="#e59875">deduplicated ✓</text>

  <path d="M744 326 L744 420" stroke="#a89fb0" stroke-width="1.75" fill="none" marker-end="url(#da1)"/>
  <rect x="608" y="424" width="248" height="56" rx="28" fill="#241f2a" stroke="#4d4556" stroke-width="1.75"/>
  <text x="638" y="459" font-size="19" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" fill="#f0edf2">your model / agent</text>

  <defs>
    <marker id="da1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#a89fb0"/>
    </marker>
    <marker id="da2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#e59875"/>
    </marker>
  </defs>
</svg>
