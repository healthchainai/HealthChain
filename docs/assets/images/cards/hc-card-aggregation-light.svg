<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" role="img" aria-label="Epic, Cerner and your EHR flow through FHIRGateway into one patient record; manual extracts are crossed out">
  <rect x="0" y="0" width="880" height="460" rx="16" fill="#faf8f7"/>
  <rect x="36" y="60"  width="216" height="72" rx="12" fill="#ffffff" stroke="#c9c2cd" stroke-width="1.5"/>
  <text x="56" y="106" font-size="30" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" fill="#211c26">Epic</text>
  <rect x="36" y="160" width="216" height="72" rx="12" fill="#ffffff" stroke="#c9c2cd" stroke-width="1.5"/>
  <text x="56" y="206" font-size="30" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" fill="#211c26">Cerner</text>
  <rect x="36" y="260" width="216" height="72" rx="12" fill="#ffffff" stroke="#c9c2cd" stroke-width="1.5"/>
  <text x="56" y="306" font-size="30" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" fill="#211c26">your EHR</text>

  <g opacity="0.5">
