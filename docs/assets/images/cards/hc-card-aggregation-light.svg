    <line x1="38" y1="407" x2="296" y2="407" stroke="#bf6b4a" stroke-width="3"/>
  </g>

  <path d="M252 96 C310 96 320 170 352 188" stroke="#5f5866" stroke-width="2.5" fill="none" marker-end="url(#s1)"/>
  <path d="M252 196 L352 208" stroke="#5f5866" stroke-width="2.5" fill="none" marker-end="url(#s1)"/>
  <path d="M252 296 C310 296 320 246 352 228" stroke="#5f5866" stroke-width="2.5" fill="none" marker-end="url(#s1)"/>

  <rect x="372" y="140" width="272" height="140" rx="14" fill="#fdf0e8" stroke="#e59875" stroke-width="2.5"/>
  <text x="400" y="198" font-size="32" font-weight="700" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" fill="#bf6b4a">FHIRGateway</text>
  <text x="400" y="242" font-size="23" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" fill="#5f5866">live · deduped</text>
  <rect x="614" y="152" width="12" height="12" fill="#e59875"/>
  <rect x="600" y="166" width="12" height="12" fill="#f0b49a"/>
  <rect x="614" y="180" width="12" height="12" fill="#e59875"/>

  <path d="M644 210 L698 210" stroke="#bf6b4a" stroke-width="3" fill="none" marker-end="url(#s2)"/>

  <rect x="702" y="140" width="148" height="140" rx="14" fill="#ffffff" stroke="#c9c2cd" stroke-width="1.5"/>
  <text x="728" y="192" font-size="30" font-weight="700" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" fill="#211c26">one</text>
  <text x="796" y="192" font-size="28" font-weight="700" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" fill="#bf6b4a">✓</text>
  <text x="728" y="234" font-size="30" font-weight="700" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" fill="#211c26">record</text>

  <defs>
