  <text x="380" y="336" font-size="30" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" fill="#211c26">"24 July, 9:30"</text>
  <text x="380" y="380" font-size="25" font-weight="700" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" fill="#bf6b4a">grounded in the record ✓</text>

