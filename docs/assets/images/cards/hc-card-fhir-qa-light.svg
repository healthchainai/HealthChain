  <path d="M96 226 L124 226 L104 260 z" fill="#ffffff" stroke="#c9c2cd" stroke-width="1.5"/>

  <path d="M336 152 L384 152" stroke="#5f5866" stroke-width="2.5" fill="none" marker-end="url(#q1)"/>

