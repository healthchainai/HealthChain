<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" role="img" aria-label="A patient question plus the live FHIR record produces a grounded answer">
  <rect x="0" y="0" width="880" height="460" rx="16" fill="#faf8f7"/>
  <rect x="36" y="80" width="300" height="146" rx="20" fill="#ffffff" stroke="#c9c2cd" stroke-width="1.5"/>
  <text x="62" y="136" font-size="26" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" fill="#211c26">"when's my next</text>
